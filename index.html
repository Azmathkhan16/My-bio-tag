<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<title>Azmath Khan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a14;
  --card:rgba(255,255,255,0.06);
  --card-border:rgba(255,255,255,0.12);
  --text:#f4f4fb;
  --muted:#a0a0c0;
  --accent:#7c5cff;
  --accent-2:#ff5c8a;
  --accent-3:#22d3ee;
  --shadow:0 20px 60px rgba(0,0,0,0.5);
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;}
body{
  min-height:100dvh;font-family:var(--font-body);color:var(--text);
  background:var(--bg);overflow-x:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:env(safe-area-inset-top,20px) 18px env(safe-area-inset-bottom,20px);
}
/* animated aurora background */
.bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;animation:float 14s ease-in-out infinite;}
.orb.a{width:340px;height:340px;background:var(--accent);top:-80px;left:-60px;}
.orb.b{width:300px;height:300px;background:var(--accent-2);bottom:-60px;right:-50px;animation-delay:-4s;}
.orb.c{width:260px;height:260px;background:var(--accent-3);top:40%;left:55%;animation-delay:-8s;opacity:.4;}
@keyframes float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-30px) scale(1.1);}66%{transform:translate(-30px,40px) scale(.95);}}

.card{
  position:relative;z-index:1;width:100%;max-width:420px;
  background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--card-border);border-radius:28px;box-shadow:var(--shadow);
  padding:34px 26px 28px;text-align:center;
  animation:rise .7s cubic-bezier(0.16,1,0.3,1);
}
@keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.avatar-wrap{position:relative;width:118px;height:118px;margin:0 auto 18px;}
.avatar{
  width:100%;height:100%;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:42px;letter-spacing:1px;color:#fff;
  box-shadow:0 8px 30px rgba(124,92,255,.45);
}
.avatar-ring{position:absolute;inset:-7px;border-radius:50%;border:2px solid transparent;
  background:linear-gradient(135deg,var(--accent),var(--accent-3)) border-box;
  -webkit-mask:linear-gradient(#000 0 0) padding-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;animation:spin 8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.live{position:absolute;bottom:6px;right:6px;width:22px;height:22px;border-radius:50%;
  background:#22c55e;border:3px solid var(--bg);box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6);}70%{box-shadow:0 0 0 10px rgba(34,197,94,0);}100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}}

h1{font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;}
.tagline{color:var(--muted);font-size:14.5px;line-height:1.5;margin-bottom:8px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:14px 0 22px;}
.chip{font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;
  background:rgba(255,255,255,.07);border:1px solid var(--card-border);color:var(--muted);}

.links{display:flex;flex-direction:column;gap:11px;}
.link{
  display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--text);
  background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:16px;
  padding:14px 16px;transition:transform .15s ease,background .2s ease,border-color .2s ease;
}
.link:active{transform:scale(.97);}
.link:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);}
.link .ic{width:42px;height:42px;flex-shrink:0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.link .meta{flex:1;text-align:left;min-width:0;}
.link .lbl{font-weight:600;font-size:15px;}
.link .val{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link .arrow{color:var(--muted);font-size:18px;transition:transform .2s ease;}
.link:hover .arrow{transform:translateX(3px);}
.ic.ig{background:linear-gradient(135deg,#feda75,#d62976,#962fbf);}
.ic.call{background:linear-gradient(135deg,#22c55e,#16a34a);}
.ic.mail{background:linear-gradient(135deg,#3b82f6,#06b6d4);}

.save-btn{
  margin-top:18px;width:100%;border:none;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:16px;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  padding:16px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 10px 28px rgba(124,92,255,.4);transition:transform .15s ease,box-shadow .2s ease;
}
.save-btn:active{transform:scale(.97);}
.share-btn{
  margin-top:10px;width:100%;cursor:pointer;color:var(--text);
  background:rgba(255,255,255,.06);border:1px solid var(--card-border);
  font-family:var(--font-body);font-weight:600;font-size:14.5px;
  padding:13px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s ease,background .2s ease;
}
.share-btn:active{transform:scale(.97);}
.share-btn:hover{background:rgba(255,255,255,.1);}

.footer{margin-top:20px;font-size:11.5px;color:var(--muted);opacity:.7;display:flex;align-items:center;justify-content:center;gap:6px;}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
  background:#fff;color:#0a0a14;font-weight:600;font-size:14px;padding:12px 20px;border-radius:999px;
  box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(0.16,1,0.3,1);z-index:50;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb a"></div><div class="orb b"></div><div class="orb c"></div></div>

<main class="card">
  <div class="avatar-wrap">
    <div class="avatar-ring"></div>
    <div class="avatar">AK</div>
    <div class="live" title="online"></div>
  </div>

  <h1>Azmath Khan</h1>
  <p class="tagline">📱 One tap and you've got me.<br>Tapped from the back of my 17 Pro Max.</p>

  <div class="chips">
    <span class="chip">✨ NFC enabled</span>
    <span class="chip">🤝 Let's connect</span>
    <span class="chip">⚡ Instant save</span>
  </div>

  <div class="links">
    <a class="link" href="https://www.instagram.com/azmathkhan143" target="_blank" rel="noopener">
      <span class="ic ig">📸</span>
      <span class="meta"><div class="lbl">Instagram</div><div class="val">@azmathkhan143</div></span>
      <span class="arrow">↗</span>
    </a>
    <a class="link" href="tel:+16038187465">
      <span class="ic call">📞</span>
      <span class="meta"><div class="lbl">Call / Text me</div><div class="val">(603) 818-7465</div></span>
      <span class="arrow">→</span>
    </a>
    <a class="link" href="mailto:azmathkhanpathan@icloud.com">
      <span class="ic mail">✉️</span>
      <span class="meta"><div class="lbl">Email</div><div class="val">azmathkhanpathan@icloud.com</div></span>
      <span class="arrow">→</span>
    </a>
  </div>

  <button class="save-btn" id="saveBtn">💾 Save my contact</button>
  <button class="share-btn" id="shareBtn">🔗 Share this card</button>

  <div class="footer">Made with 💜 · Just tap & vibe</div>
</main>

<div class="toast" id="toast">Saved! 🎉</div>

<script>
const toast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
};

// ── Save contact (vCard) ──────────────────────────────
document.getElementById('saveBtn').addEventListener('click', () => {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Khan;Azmath;;;',
    'FN:Azmath Khan',
    'TEL;TYPE=CELL:+16038187465',
    'EMAIL;TYPE=INTERNET:azmathkhanpathan@icloud.com',
    'URL;TYPE=Instagram:https://instagram.com/azmathkhan143',
    'END:VCARD'
  ].join('\r\n');
  const blob = new Blob([vcard], {type:'text/vcard'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'Azmath_Khan.vcf';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Contact saved! 🎉');
});

// ── Share ─────────────────────────────────────────────
document.getElementById('shareBtn').addEventListener('click', async () => {
  const data = { title:'Azmath Khan', text:"Here's my card — let's connect!", url: window.location.href };
  try {
    if (navigator.share) { await navigator.share(data); }
    else { await navigator.clipboard.writeText(window.location.href); toast('Link copied! 🔗'); }
  } catch(e) {}
});
</script>
</body>
</html>
